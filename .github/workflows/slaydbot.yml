name: SlaydBot PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  bot:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install bot dependencies
        run: npm install
        working-directory: slaydbot

      - name: Run SlaydBot
        run: node runner.js
        working-directory: slaydbot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
